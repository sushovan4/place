<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" preserveAspectRatio="xMidYMid meet">
  <!-- inner frame rule -->
  <rect x="36" y="36" width="648" height="328" fill="none" stroke="#c8b894" stroke-width="0.6"/>

  <!-- title masthead -->
  <text x="360" y="68" fill="#6c1d1a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-weight="500" font-size="16" letter-spacing="4" text-anchor="middle">ONE KNOB  ·  ANALYTIC ENGINE</text>

  <!-- italic deck -->
  <text x="360" y="92" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">— from corpus to certified Φ, in closed form —</text>

  <!-- horizontal hairline -->
  <line x1="120" y1="104" x2="600" y2="104" stroke="#c8b894" stroke-width="0.5"/>

  <!-- ===================================================================
       Five-stage engine flow:
         INPUT (corpus + N)  →  τ*  →  R_k  →  w_k  →  CERTIFIED Φ
       =================================================================== -->

  <!-- STAGE 1 — INPUT: corpus of PDs + N -->
  <!-- three mini-PD axes (stacked) -->
  <g stroke="#2b211a" fill="none" stroke-width="0.5">
    <line x1="48"  y1="170" x2="88"  y2="170"/>
    <line x1="48"  y1="170" x2="48"  y2="140"/>
    <line x1="60"  y1="210" x2="100" y2="210"/>
    <line x1="60"  y1="210" x2="60"  y2="180"/>
    <line x1="48"  y1="250" x2="88"  y2="250"/>
    <line x1="48"  y1="250" x2="48"  y2="220"/>
  </g>
  <g fill="#6c1d1a" stroke="none">
    <circle cx="60" cy="158" r="1.8"/>
    <circle cx="68" cy="150" r="1.8"/>
    <circle cx="76" cy="162" r="1.8"/>
    <circle cx="72" cy="196" r="1.8"/>
    <circle cx="80" cy="190" r="1.8"/>
    <circle cx="88" cy="198" r="1.8"/>
    <circle cx="60" cy="238" r="1.8"/>
    <circle cx="68" cy="230" r="1.8"/>
    <circle cx="76" cy="242" r="1.8"/>
  </g>
  <!-- N = 10 annotation, sitting underneath -->
  <text x="76" y="285" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="16" text-anchor="middle">N = 10</text>
  <text x="76" y="310" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9" letter-spacing="1.6" text-anchor="middle">INPUT</text>

  <!-- arrow 1: from data -->
  <g stroke="#6c1d1a" fill="none" stroke-width="1.0">
    <line x1="130" y1="220" x2="200" y2="220"/>
    <path d="M 190 213 L 200 220 L 190 227"/>
  </g>
  <text x="165" y="208" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="11" text-anchor="middle">from data</text>

  <!-- STAGE 2 — τ* (scale center) -->
  <text x="240" y="232" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="36" text-anchor="middle">τ*</text>
  <text x="240" y="310" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9" letter-spacing="1.6" text-anchor="middle">SCALE CENTER</text>

  <!-- arrow 2: geometric -->
  <g stroke="#6c1d1a" fill="none" stroke-width="1.0">
    <line x1="278" y1="220" x2="340" y2="220"/>
    <path d="M 330 213 L 340 220 L 330 227"/>
  </g>
  <text x="309" y="208" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="11" text-anchor="middle">geometric</text>

  <!-- STAGE 3 — R_1, ..., R_N (geometric scales as growing bars) -->
  <g fill="#6c1d1a" fill-opacity="0.55" stroke="#6c1d1a" stroke-width="0.6">
    <rect x="358" y="260" width="10" height="10"/>
    <rect x="372" y="252" width="10" height="18"/>
    <rect x="386" y="240" width="10" height="30"/>
    <rect x="400" y="222" width="10" height="48"/>
    <rect x="414" y="200" width="10" height="70"/>
  </g>
  <line x1="354" y1="270" x2="430" y2="270" stroke="#2b211a" stroke-width="0.7"/>
  <text x="392" y="232" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="14" text-anchor="middle">R<tspan baseline-shift="sub" font-size="0.65em">k</tspan></text>
  <text x="392" y="310" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9" letter-spacing="1.6" text-anchor="middle">SCALES</text>

  <!-- arrow 3: max λ(ν) -->
  <g stroke="#6c1d1a" fill="none" stroke-width="1.0">
    <line x1="448" y1="220" x2="510" y2="220"/>
    <path d="M 500 213 L 510 220 L 500 227"/>
  </g>
  <text x="479" y="208" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="11" text-anchor="middle">max λ(ν)</text>

  <!-- STAGE 4 — w_k (closed-form weights, decreasing bars) -->
  <g fill="#6c1d1a" fill-opacity="0.55" stroke="#6c1d1a" stroke-width="0.6">
    <rect x="525" y="200" width="10" height="70"/>
    <rect x="539" y="220" width="10" height="50"/>
    <rect x="553" y="238" width="10" height="32"/>
    <rect x="567" y="252" width="10" height="18"/>
    <rect x="581" y="262" width="10" height="8"/>
  </g>
  <line x1="521" y1="270" x2="595" y2="270" stroke="#2b211a" stroke-width="0.7"/>
  <text x="558" y="232" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="14" text-anchor="middle">w<tspan baseline-shift="sub" font-size="0.65em">k</tspan></text>
  <text x="558" y="310" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9" letter-spacing="1.6" text-anchor="middle">WEIGHTS</text>

  <!-- arrow 4: concatenate -->
  <g stroke="#6c1d1a" fill="none" stroke-width="1.0">
    <line x1="612" y1="220" x2="650" y2="220"/>
    <path d="M 640 213 L 650 220 L 640 227"/>
  </g>

  <!-- STAGE 5 — CERTIFIED Φ : Φ(A), ρ_-(t; ν) band -->
  <!-- mini band -->
  <path d="M 654 270 L 690 230 L 690 244 L 668 270 Z" fill="#6c1d1a" fill-opacity="0.18" stroke="none"/>
  <line x1="654" y1="270" x2="690" y2="230" stroke="#6c1d1a" stroke-width="1.0"/>
  <line x1="658" y1="270" x2="690" y2="244" stroke="#2b211a" stroke-width="0.9" stroke-dasharray="2 1.5"/>
  <text x="670" y="222" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">Φ, ρ<tspan baseline-shift="sub" font-size="0.7em">−</tspan></text>
  <text x="670" y="310" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9" letter-spacing="1.6" text-anchor="middle">CERTIFIED Φ</text>

  <!-- corner fleurons -->
  <text x="50" y="56" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20">❦</text>
  <text x="678" y="56" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20" text-anchor="end">❦</text>
  <text x="50" y="356" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20">❦</text>
  <text x="678" y="356" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20" text-anchor="end">❦</text>

  <!-- caption stripe at bottom -->
  <text x="360" y="356" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="11" letter-spacing="3" text-anchor="middle">— FIT BY DATA, CERTIFIED BY DESIGN —</text>
</svg>
