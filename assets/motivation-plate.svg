<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" preserveAspectRatio="xMidYMid meet">
  <!-- subtle inner frame rule -->
  <rect x="36" y="36" width="648" height="328" fill="none" stroke="#c8b894" stroke-width="0.6"/>

  <!-- masthead-style title -->
  <text x="360" y="68" fill="#6c1d1a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-weight="500" font-size="16" letter-spacing="4" text-anchor="middle">STABILITY  ·  DISCRIMINABILITY</text>

  <!-- italic deck under title -->
  <text x="360" y="92" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">— two sides of an honest embedding —</text>

  <!-- horizontal hairline under deck -->
  <line x1="120" y1="104" x2="600" y2="104" stroke="#c8b894" stroke-width="0.5"/>

  <!-- band fill (valid-region between ρ- and ρ+) -->
  <path d="M 80 330 C 200 280, 400 180, 640 110 L 640 210 C 480 255, 280 300, 80 330 Z" fill="#6c1d1a" fill-opacity="0.11" stroke="none"/>

  <!-- ρ+ upper bound -->
  <path d="M 80 330 C 200 280, 400 180, 640 110" stroke="#6c1d1a" stroke-width="2.2" fill="none"/>

  <!-- ρ- lower bound (dashed) -->
  <path d="M 80 330 C 280 300, 480 255, 640 210" stroke="#2b211a" stroke-width="1.6" fill="none" stroke-dasharray="5.5 3.5"/>

  <!-- axes -->
  <line x1="80" y1="330" x2="660" y2="330" stroke="#2b211a" stroke-width="1.0"/>
  <line x1="80" y1="330" x2="80" y2="115" stroke="#2b211a" stroke-width="1.0"/>

  <!-- sample Φ points along an honest embedding curve -->
  <g fill="#6c1d1a" stroke="none">
    <circle cx="170" cy="312" r="3.3"/>
    <circle cx="260" cy="282" r="3.3"/>
    <circle cx="350" cy="248" r="3.3"/>
    <circle cx="440" cy="215" r="3.3"/>
    <circle cx="530" cy="180" r="3.3"/>
    <circle cx="610" cy="148" r="3.3"/>
  </g>

  <!-- curve labels -->
  <text x="624" y="106" fill="#6c1d1a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="28">ρ<tspan baseline-shift="sub" font-size="0.65em">+</tspan></text>
  <text x="624" y="220" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="28">ρ<tspan baseline-shift="sub" font-size="0.65em">−</tspan></text>

  <!-- axis labels -->
  <text x="84" y="126" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="15">‖Φ(x) − Φ(y)‖<tspan baseline-shift="sub" font-size="0.7em">ℋ</tspan></text>
  <text x="660" y="350" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="15" text-anchor="end">d<tspan baseline-shift="sub" font-size="0.7em">ℬ</tspan>(x, y)</text>

  <!-- corner fleurons (small ornaments) -->
  <text x="50" y="56" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20">❦</text>
  <text x="678" y="56" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20" text-anchor="end">❦</text>
  <text x="50" y="356" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20">❦</text>
  <text x="678" y="356" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20" text-anchor="end">❦</text>

  <!-- caption stripe at bottom -->
  <text x="360" y="356" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="11" letter-spacing="3" text-anchor="middle">— THE BAND —</text>
</svg>
