<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" preserveAspectRatio="xMidYMid meet">
  <!-- inner frame rule -->
  <rect x="36" y="36" width="648" height="328" fill="none" stroke="#c8b894" stroke-width="0.6"/>

  <!-- title masthead -->
  <text x="360" y="68" fill="#6c1d1a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-weight="500" font-size="16" letter-spacing="4" text-anchor="middle">THE GUARANTEES</text>

  <!-- italic deck -->
  <text x="360" y="92" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">— stability · minimax · per-prediction certificate —</text>

  <!-- horizontal hairline -->
  <line x1="120" y1="104" x2="600" y2="104" stroke="#c8b894" stroke-width="0.5"/>

  <!-- ===================================================================
       Three class centroids in Φ-space, each with its r_m ball.
       A test point inside the middle ball is "CERTIFIED".
       =================================================================== -->

  <!-- coordinate frame label "Φ-space" (light) -->
  <text x="660" y="332" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="11" text-anchor="end">Φ-space</text>

  <!-- Class 1 ball -->
  <circle cx="200" cy="230" r="58" fill="#6c1d1a" fill-opacity="0.08" stroke="#6c1d1a" stroke-width="1.0" stroke-dasharray="4 3"/>
  <circle cx="200" cy="230" r="3.5" fill="#6c1d1a" stroke="none"/>
  <text x="200" y="313" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">μ̂<tspan baseline-shift="sub" font-size="0.65em">1</tspan></text>

  <!-- Class 2 (middle, firing) ball -->
  <circle cx="395" cy="200" r="50" fill="#6c1d1a" fill-opacity="0.18" stroke="#6c1d1a" stroke-width="1.4" stroke-dasharray="4 3"/>
  <circle cx="395" cy="200" r="3.5" fill="#6c1d1a" stroke="none"/>
  <text x="395" y="278" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">μ̂<tspan baseline-shift="sub" font-size="0.65em">2</tspan></text>

  <!-- Test diagram point A_star inside Class 2 ball -->
  <circle cx="412" cy="186" r="2.8" fill="#2b211a" stroke="none"/>
  <text x="423" y="184" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="11">Φ(A<tspan baseline-shift="sub" font-size="0.65em">⋆</tspan>)</text>

  <!-- Tiny rubber-stamp "CERTIFIED" inside the firing ball -->
  <g transform="rotate(-7 395 220)">
    <rect x="368" y="208" width="54" height="20" fill="rgba(245, 239, 222, 0.6)" stroke="#6c1d1a" stroke-width="1.4" rx="1"/>
    <rect x="370" y="210" width="50" height="16" fill="none" stroke="#6c1d1a" stroke-width="0.6"/>
    <text x="395" y="222" fill="#6c1d1a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-weight="700" font-size="8" letter-spacing="1.4" text-anchor="middle">CERTIFIED</text>
  </g>

  <!-- r_m radius arrow inside Class 2 ball -->
  <g stroke="#57473a" stroke-width="0.5" fill="none">
    <line x1="395" y1="200" x2="442" y2="170"/>
    <path d="M 437 167 L 442 170 L 438 173"/>
  </g>
  <text x="439" y="161" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="11">r<tspan baseline-shift="sub" font-size="0.7em">m</tspan></text>

  <!-- Class 3 ball -->
  <circle cx="565" cy="245" r="46" fill="#6c1d1a" fill-opacity="0.08" stroke="#6c1d1a" stroke-width="1.0" stroke-dasharray="4 3"/>
  <circle cx="565" cy="245" r="3.5" fill="#6c1d1a" stroke="none"/>
  <text x="565" y="316" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">μ̂<tspan baseline-shift="sub" font-size="0.65em">3</tspan></text>

  <!-- Δ annotation: double-arrow between μ̂₁ and μ̂₂ centroids -->
  <g stroke="#2b211a" stroke-width="0.8" fill="none">
    <line x1="220" y1="200" x2="378" y2="170"/>
    <path d="M 226 195 L 220 200 L 226 207"/>
    <path d="M 374 167 L 378 170 L 372 174"/>
  </g>
  <text x="299" y="178" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="14" text-anchor="middle">Δ</text>

  <!-- corner fleurons -->
  <text x="50" y="56" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20">❦</text>
  <text x="678" y="56" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20" text-anchor="end">❦</text>
  <text x="50" y="356" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20">❦</text>
  <text x="678" y="356" fill="#c8b894" font-family="EB Garamond, Georgia, serif" font-size="20" text-anchor="end">❦</text>

  <!-- caption stripe at bottom -->
  <text x="360" y="356" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="11" letter-spacing="3" text-anchor="middle">— FROM λ TO CERTIFIED PREDICTION —</text>
</svg>
